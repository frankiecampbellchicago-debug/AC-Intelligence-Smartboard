name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        # Baked into the bundle so the shared board works with zero user setup.
        # Set these under the repo's Settings → Secrets and variables → Actions:
        #   Variable  BACKEND_URL   e.g. https://ac-smartboard.up.railway.app
        #   Secret    BOARD_SECRET  the same shared secret set on the Railway backend
        env:
          # Base path = "/<repo-name>/" so this works on the source repo AND forks.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BACKEND_URL: ${{ vars.BACKEND_URL }}
          VITE_BOARD_SECRET: ${{ secrets.BOARD_SECRET }}
        run: npx vite build --config vite.web.config.ts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
