<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AC Intelligence Smartboard</title>
    <script>
      try {
        const t = localStorage.getItem('wc-theme')
        const dark =
          t === 'dark' ||
          ((t === 'system' || !t) && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/src/main.tsx"></script>
  </body>
</html>
